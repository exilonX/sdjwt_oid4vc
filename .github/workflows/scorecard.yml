name: Scorecard supply-chain security

# OpenSSF Scorecard: rates the repo's supply-chain posture (branch protection,
# pinned deps, token permissions, …). Results go to the Security tab and, via
# publish_results, to the public OpenSSF API that backs the README badge.

on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 1" # Mondays 07:20 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result
      id-token: write # publish_results to the OpenSSF API
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: results.sarif
