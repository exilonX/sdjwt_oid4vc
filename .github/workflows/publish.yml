name: Publish to pub.dev

# Tokenless automated publishing via pub.dev + GitHub OIDC — same setup proven
# out in the attested_secure_keys package.
#
# One-time setup on pub.dev:
#   Admin → Automated publishing → Enable publishing from GitHub Actions,
#   repository exilonX/sdjwt_oid4vc, tag pattern: v{{version}}
#
# Then release by pushing a semver tag that matches pubspec `version:`, e.g.:
#   git tag v0.1.0-dev.1 && git push origin v0.1.0-dev.1
#
# The reusable workflow checks out, runs `dart pub publish --dry-run`, verifies
# the tag matches `version:` in pubspec.yaml, and publishes over OIDC.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
