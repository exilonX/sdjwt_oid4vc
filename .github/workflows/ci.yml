name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs widen only what they need. Actions are pinned
# to full commit SHAs (Dependabot's github-actions updater keeps them current).
permissions:
  contents: read

jobs:
  analyze-test:
    name: Analyze · Test (Dart ${{ matrix.sdk }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Codecov tokenless (OIDC) upload
    strategy:
      fail-fast: false
      matrix:
        # Pin the declared lower bound so the floor in pubspec.yaml is actually
        # exercised, not just "whatever stable happens to be".
        sdk: ["3.4.0", stable]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ matrix.sdk }}
      - run: dart --version
      - name: Install dependencies
        run: dart pub get
      # Formatting/coverage track the latest formatter+tooling, so gate them on
      # stable; the min-SDK job still compiles, analyzes, tests, and runs the example.
      - name: Verify formatting
        if: matrix.sdk == 'stable'
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze
        run: dart analyze ${{ matrix.sdk == 'stable' && '--fatal-infos' || '' }}
      - name: Run tests with coverage
        run: dart test --coverage=coverage
      - name: Format coverage to lcov
        if: matrix.sdk == 'stable'
        run: >-
          dart run coverage:format_coverage --lcov
          --in=coverage --out=coverage/lcov.info
          --report-on=lib --packages=.dart_tool/package_config.json
      - name: Upload coverage to Codecov
        if: matrix.sdk == 'stable'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false # never block CI on a coverage-upload hiccup
        # Public repos upload tokenless; for a private repo add a CODECOV_TOKEN secret.
      - name: Smoke-test the example
        run: dart run example/sdjwt_oid4vc_example.dart

  pointycastle-floor:
    name: Compat · pointycastle 3.9.x (wallet pin)
    runs-on: ubuntu-latest
    # The constraint is `>=3.9.1 <5.0.0` so wallets pinned to pointycastle 3.9.x
    # (PDF/NFC) resolve with no override. Pin it to the floor here and run the
    # full suite, so a 4.x-only API can never slip in and break those consumers.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable
      - name: Pin pointycastle to the floor
        run: |
          printf '\ndependency_overrides:\n  pointycastle: 3.9.1\n' >> pubspec.yaml
      - run: dart pub get
      - name: Show resolved pointycastle
        run: dart pub deps | grep pointycastle
      - run: dart analyze
      - run: dart test

  release-checks:
    name: Release checks (publish dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable
      - run: dart pub get
      # A clean publishability gate on every PR: catches missing LICENSE,
      # bad pubspec metadata, stray files, oversized package, etc.
      - name: Publish dry-run
        run: dart pub publish --dry-run
